name: Deploy PHOTO_OS to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Only one deployment runs at a time; cancel any in-progress run
# on a new push so we never deploy stale code.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # ── Permissions ──────────────────────────────────────────────────────────
    # Without `contents: write` the default GITHUB_TOKEN is read-only and
    # peaceiris/actions-gh-pages will fail with HTTP 403 when pushing to
    # the gh-pages branch.
    permissions:
      contents: write   # push to gh-pages
      actions: read     # read workflow metadata (checkout, cache)

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Node.js setup ───────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build static export ─────────────────────────────────────────────
      # NODE_ENV=production activates basePath + assetPrefix in next.config.ts
      # Next.js output: "export" writes the static site to ./out/
      - name: Build (next export → out/)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_AI_ENDPOINT: ${{ secrets.NEXT_PUBLIC_AI_ENDPOINT }}

      # ── 5. Pre-flight validation ────────────────────────────────────────────
      # Abort the deployment early if the build did not produce a valid
      # out/index.html. This prevents pushing a broken or empty release.
      # If this step fails, check that `output: "export"` is set in
      # next.config.ts and that `npm run build` completed without errors.
      - name: Pre-flight — verify out/index.html exists
        run: |
          if [ ! -f "out/index.html" ]; then
            echo "❌ FATAL: out/index.html not found."
            echo "   Possible causes:"
            echo "   1. Build failed silently — check step 4 logs."
            echo "   2. next.config.ts is missing output: 'export'."
            echo "   3. Next.js wrote files to a different directory."
            echo ""
            echo "   Contents of working directory:"
            ls -la
            echo ""
            echo "   Contents of out/ (if it exists):"
            ls -la out/ 2>/dev/null || echo "   out/ directory does not exist."
            exit 1
          fi
          echo "✅ out/index.html found — build output verified."
          echo "   Build artifact sizes:"
          du -sh out/
          echo "   Files in out/:"
          ls -lh out/

      # ── 6. SPA 404 fix ─────────────────────────────────────────────────────
      # GitHub Pages returns this 404 page on any URL it doesn't recognise.
      # We overwrite it with a redirect script that converts the path back into
      # a query-string so the Next.js client-side router can handle it.
      # segmentCount=1 matches the /Fotografia basePath prefix.
      - name: Write SPA redirect into out/404.html
        run: |
          cat > out/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8" />
            <title>PHOTO_OS PRO</title>
            <script>
              (function () {
                var segmentCount = 1;
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
                  l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                  (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                  l.hash
                );
              })();
            </script>
          </head>
          <body></body>
          </html>
          EOF

      # ── 7. Add .nojekyll ───────────────────────────────────────────────────
      # Prevents GitHub Pages' Jekyll processor from stripping files and
      # folders that start with an underscore (Next.js uses _next/).
      - name: Add .nojekyll
        run: touch out/.nojekyll

      # ── 8. Deploy to gh-pages branch ───────────────────────────────────────
      # peaceiris/actions-gh-pages pushes ONLY the contents of publish_dir
      # (./out) to the gh-pages branch using force_orphan: true — meaning
      # the gh-pages branch only ever contains the compiled app, never
      # source files like README.md, package.json, or src/.
      #
      # If you see README.md on GitHub Pages, the "Source" in
      # Settings → Pages is pointing to the main branch, not gh-pages.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This MUST match where next build writes its output.
          # Next.js with output:"export" always uses ./out
          publish_dir: ./out
          publish_branch: gh-pages
          # force_orphan: the gh-pages branch is always a single commit
          # containing ONLY the build output — no source history.
          force_orphan: true
          commit_message: "deploy: ${{ github.sha }}"
